services:

  builder:
    build:
      context: .
      target: build
      args:
        STRUDEL_REPO: ${STRUDEL_REPO:-https://codeberg.org/uzu/strudel}
        STRUDEL_REF:  ${STRUDEL_REF:-}
    image: strudel-local-build
    volumes:
      - ./dist:/out:rw
    command: ["sh", "-c", "cp -a /src/website/dist/. /out/ && echo 'dist exported to ./dist'"]
    profiles: [build]

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-127.0.0.1:8080}:80"
    volumes:
      - ./dist:/srv/http/strudel:ro
      - ./samples:/srv/samples:ro
      - ./nginx/strudel.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/headers.conf:/etc/nginx/conf.d/headers.conf:ro
    profiles: [dev]
