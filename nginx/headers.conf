# Security + privacy headers.
# Tight CSP prevents any browser-side external fetch.

add_header X-Content-Type-Options    "nosniff"            always;
add_header X-Frame-Options           "SAMEORIGIN"         always;
add_header Referrer-Policy           "no-referrer"        always;
add_header Permissions-Policy        "microphone=(self), camera=(), geolocation=()" always;

# Allow only self + blob: (Web Audio API), no external CDN/fonts/scripts.
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' 'wasm-unsafe-eval' data: blob:; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: blob:; media-src 'self' blob:; connect-src 'self' blob:; worker-src 'self' blob:;" always;
