server {
    listen 80;
    server_name strudel.local;

    root /srv/http/strudel;
    index index.html;

    include /etc/nginx/conf.d/headers.conf;

    # Local sample pack endpoint — ^~ stops regex location matching for this prefix
    location ^~ /samples/ {
        alias /srv/samples/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Immutable static assets
    location ~* \.(js|mjs|css|png|jpg|jpeg|gif|svg|ico|webp|woff2?|ttf|otf|json|wasm)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    # Service worker must never be cached
    location = /sw.js {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
